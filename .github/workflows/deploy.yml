name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create admin.json from secrets
        run: |
          mkdir -p .env
          printf '%s' '${{ secrets.ADMIN_JSON_CONTENT }}' > .env/admin.json

      - name: Copy project to public
        run: |
          mkdir -p public
          cp -r index.html main.js src .env public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
