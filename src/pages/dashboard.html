<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crewly — Dashboard</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../../src/assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../src/assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../src/assets/favicons/favicon-16x16.png">
    <link rel="manifest" href="../../site.webmanifest">
    <link rel="stylesheet" href="../../src/styles/main.css">
</head>

<body class="page-dashboard">
    <header class="dashboard-header">
        <div class="dashboard-header__brand">
            <img src="../../src/assets/imgs/logo.png" alt="Logotipo Crewly — timon nautico"
                class="dashboard-header__logo" width="28" height="28">
            <span class="dashboard-header__name">Crewly</span>
        </div>
        <div class="dashboard-header__actions">
            <span class="dashboard-header__greeting">Hola, Admin</span>
            <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="Avatar del administrador"
                class="dashboard-header__avatar" width="36" height="36">
            <button class="btn btn--ghost" id="logout-btn">
                Cerrar sesión
            </button>
        </div>
    </header>

</body>

</html>
